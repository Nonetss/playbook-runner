name: Docker Image CI

on:
  push:
    branches:
      - "main"
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  IMAGE_TAG: ${{ github.ref_name }}

jobs:
  build:
    # Runners hosteados por GitHub, no self-hosted: no hay disco persistente
    # entre corridas, así que aquí "no rebuild desde 0" viene del cache
    # remoto (type=gha) en vez del cache local del builder de un runner
    # persistente como en Gitea. Cada arch construye nativo en su runner
    # (amd64 en ubuntu-latest, arm64 en el runner arm64 de GitHub) sin QEMU.
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            suffix: -backend
            dockerfile: apps/backend/Dockerfile
            arch: amd64
          - name: backend
            suffix: -backend
            dockerfile: apps/backend/Dockerfile
            arch: arm64
          - name: ansible
            suffix: -ansible
            dockerfile: apps/ansible/Dockerfile
            arch: amd64
          - name: ansible
            suffix: -ansible
            dockerfile: apps/ansible/Dockerfile
            arch: arm64
          - name: frontend
            suffix: -frontend
            dockerfile: apps/frontend/Dockerfile
            arch: amd64
          - name: frontend
            suffix: -frontend
            dockerfile: apps/frontend/Dockerfile
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }} (${{ matrix.arch }})
        run: |
          IMAGE_ID=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/playbook-runner${{ matrix.suffix }}" | tr '[:upper:]' '[:lower:]')

          echo "Building ${{ matrix.name }} image natively on ${{ matrix.arch }} runner: $IMAGE_ID"

          docker buildx build . \
            -f "${{ matrix.dockerfile }}" \
            --platform "linux/${{ matrix.arch }}" \
            --cache-from "type=gha,scope=${{ matrix.name }}-${{ matrix.arch }}" \
            --cache-to "type=gha,mode=max,scope=${{ matrix.name }}-${{ matrix.arch }}" \
            -t "$IMAGE_ID:sha-${{ github.sha }}-${{ matrix.arch }}" \
            --push

  merge:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            suffix: -backend
          - name: ansible
            suffix: -ansible
          - name: frontend
            suffix: -frontend
    steps:
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest for ${{ matrix.name }}
        run: |
          IMAGE_ID=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/playbook-runner${{ matrix.suffix }}" | tr '[:upper:]' '[:lower:]')
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-8)

          docker buildx imagetools create \
            -t "$IMAGE_ID:latest" \
            -t "$IMAGE_ID:${{ env.IMAGE_TAG }}" \
            -t "$IMAGE_ID:${{ env.IMAGE_TAG }}-$SHA_SHORT" \
            "$IMAGE_ID:sha-${{ github.sha }}-amd64" \
            "$IMAGE_ID:sha-${{ github.sha }}-arm64"

      - name: Inspect image
        run: |
          IMAGE_ID=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/playbook-runner${{ matrix.suffix }}" | tr '[:upper:]' '[:lower:]')
          docker buildx imagetools inspect "$IMAGE_ID:${{ env.IMAGE_TAG }}"

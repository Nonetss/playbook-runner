# ─────────────────────────────────────────────────────────────────────────────
# Production compose overlay.
#
# - Services talk to each other over the docker network via service-name DNS
#   (no localhost). See BACKEND_URL / ANSIBLE_URL / BETTER_AUTH_URL below.
# - Only the frontend publishes a host port; backend, ansible, and postgres
#   stay internal (reachable on the network as `backend:3000`, `ansible:8000`,
#   `postgres:5432`).
# - Images are pulled from GitHub Container Registry (ghcr.io/nonetss/...).
#   No local build, no *_IMAGE env vars — only the *_IMAGE_TAG is overridable
#   in .env (e.g. pin to v0.0.5 by setting ANSIBLE_IMAGE_TAG=v0.0.5).
# - PostgreSQL is bundled with a named volume (postgres_data) so data survives
#   `docker compose down` / `up` cycles. Use an external managed DB instead
#   by deleting this service and pointing DATABASE_URL at it.
#
# Usage:
#   cp .env.example .env  # fill in POSTGRES_PASSWORD, BETTER_AUTH_*, etc.
#   docker compose -f compose.prod.yml --env-file .env up -d
#
# The backend applies Drizzle migrations and seeds the default admin user
# on its own startup (see apps/backend/src/index.ts), so a fresh stack
# just needs `up -d` and nothing else.
# ─────────────────────────────────────────────────────────────────────────────

name: playbook-runner

services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres
    init: true
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-playbook_runner}
      POSTGRES_USER: ${POSTGRES_USER:-playbook_runner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Migrations and the default admin user are applied on the backend's own
  # startup (apps/backend/src/index.ts runs Drizzle's migrate() + the seed
  # in a bootstrap() function). No init container needed.

  ansible:
    image: ghcr.io/nonetss/playbook-runner-ansible:${ANSIBLE_IMAGE_TAG:-latest}
    pull_policy: always
    container_name: ansible
    init: true
    restart: unless-stopped
    env_file: .env
    environment:
      BACKEND_URL: http://backend:3000
    expose:
      - "8000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/openapi.json').read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  backend:
    image: ghcr.io/nonetss/playbook-runner-backend:${BACKEND_IMAGE_TAG:-latest}
    pull_policy: always
    container_name: backend
    init: true
    restart: unless-stopped
    env_file: .env
    environment:
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?BETTER_AUTH_URL is required (public URL, e.g. https://your-domain.com)}
      ANSIBLE_URL: http://ansible:8000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:4321}
      NODE_ENV: production
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3000/').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    image: ghcr.io/nonetss/playbook-runner-frontend:${FRONTEND_IMAGE_TAG:-latest}
    pull_policy: always
    container_name: frontend
    init: true
    restart: unless-stopped
    env_file: .env
    environment:
      BETTER_AUTH_URL: http://backend:3000
    ports:
      - "${FRONTEND_PORT:-4321}:80"
    depends_on:
      backend:
        condition: service_healthy
      ansible:
        condition: service_healthy

volumes:
  postgres_data:

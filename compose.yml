name: playbook-runner

services:
  ansible:
    build:
      context: .
      dockerfile: apps/ansible/Dockerfile
    container_name: ansible
    init: true
    env_file:
      - path: apps/ansible/.env
        required: false
    environment:
      BACKEND_URL: http://backend:3000
      ANSIBLE_PLAYBOOK_PATH: /app/playbook
    volumes:
      - ./apps/ansible/playbook:/app/playbook
    ports:
      - "8000:8000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: frontend
    init: true
    ports:
      - "4321:80"
    env_file:
      - path: apps/frontend/.env
        required: false
    environment:
      BETTER_AUTH_URL: http://backend:3000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: backend
    init: true
    expose:
      - "3000"
    env_file:
      - path: apps/backend/.env
        required: false
    environment:
      CORS_ORIGIN: http://localhost:4321
      ANSIBLE_URL: http://ansible:8000
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://localhost:3000/').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

name: none.stack

services:
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        PUBLIC_SERVER_URL: http://localhost:4321
    container_name: frontend
    init: true
    ports:
      - "4321:80"
    env_file:
      - path: apps/frontend/.env
        required: false
    environment:
      BETTER_AUTH_URL: http://backend:3000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: backend
    init: true
    expose:
      - "3000"
    env_file:
      - path: apps/backend/.env
        required: false
    environment:
      CORS_ORIGIN: http://localhost:4321
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
